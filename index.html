<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="refresh" content="5; url=https://jorge-riquelme.github.io" />
  <title>Jorge Riquelme — Redirecting</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root { --bg:#1A1C1E; --text:#F2F2F2; --muted:#9BA4B0; --gold:#D4AF37; }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;}
    body{background:var(--bg);color:var(--text);font-family:"Inter",sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;position:relative;overflow:hidden;}
    body::before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,#1A1C1E 60%,#1f2226 100%);z-index:0;}
    body::after{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(212,175,55,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(212,175,55,0.03) 1px,transparent 1px);background-size:60px 60px;z-index:0;}
    .container{position:relative;z-index:1;text-align:center;padding:2rem;max-width:600px;}
    .logo{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:1rem;color:var(--gold);letter-spacing:0.05em;margin-bottom:2.5rem;}
    h1{font-family:"JetBrains Mono",monospace;font-weight:800;font-size:clamp(2rem,5vw,3.2rem);color:var(--gold);line-height:1.1;margin-bottom:1.5rem;}
    .label{font-size:0.85rem;font-weight:400;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.75rem;}
    p{font-size:1.1rem;color:var(--muted);line-height:1.7;margin-bottom:2rem;}
    a{display:inline-block;border:1px solid var(--gold);color:var(--gold);text-decoration:none;padding:0.75rem 2rem;font-size:0.875rem;letter-spacing:0.08em;transition:background 0.2s,color 0.2s;}
    a:hover{background:var(--gold);color:var(--bg);}
    .countdown{margin-top:1.5rem;font-size:0.8rem;color:var(--muted);}
    #timer{color:var(--gold);font-weight:600;}
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">JR</div>
    <div class="label">Portfolio</div>
    <h1>Jorge Riquelme</h1>
    <p>He actualizado mi portafolio a un nuevo nombre.<br/>En unos segundos seras redireccionado automaticamente.<br/>Gracias por tu paciencia.</p>
    <a href="https://jorge-riquelme.github.io">Ir ahora &rarr;</a>
    <div class="countdown">Redireccionando en <span id="timer">5</span> segundos...</div>
  </div>
  <script>
    let t=5;const el=document.getElementById("timer");
    const iv=setInterval(()=>{t--;el.textContent=t;if(t<=0){clearInterval(iv);window.location.href="https://jorge-riquelme.github.io";}},1000);
  </script>
</body>
</html>
